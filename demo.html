<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal UI Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            color: #00ff41;
            margin: 0;
            padding: 20px;
        }
        
        .theme-matrix {
            --color-primary: #00ff41;
            --color-secondary: #008f11;
            --color-accent: #00ff41;
            --color-background: #000000;
            --color-surface: #0a0a0a;
            --color-border: #00ff41;
        }
        
        .theme-tron {
            --color-primary: #00ffff;
            --color-secondary: #0080ff;
            --color-accent: #ff8000;
            --color-background: #0a0a0a;
            --color-surface: #111111;
            --color-border: #00ffff;
        }
        
        .terminal-button {
            background: transparent;
            border: 2px solid var(--color-primary);
            color: var(--color-primary);
            padding: 8px 16px;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .terminal-button:hover {
            background: var(--color-primary);
            color: black;
            box-shadow: 0 0 20px var(--color-primary);
        }
        
        .terminal-card {
            background: black;
            border: 1px solid var(--color-primary);
            border-radius: 8px;
            padding: 24px;
            margin: 16px 0;
            box-shadow: 0 0 10px var(--color-primary);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function Demo() {
            const [theme, setTheme] = useState('matrix');
            const [konamiSequence, setKonamiSequence] = useState([]);
            
            const KONAMI_CODE = [
                'ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
                'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight',
                'KeyB', 'KeyA'
            ];
            
            useEffect(() => {
                const handleKeyPress = (e) => {
                    const newSequence = [...konamiSequence, e.code];
                    
                    if (!KONAMI_CODE.slice(0, newSequence.length).every((key, i) => key === newSequence[i])) {
                        setKonamiSequence([]);
                        return;
                    }
                    
                    if (newSequence.length === KONAMI_CODE.length) {
                        setTheme(prev => prev === 'matrix' ? 'tron' : 'matrix');
                        setKonamiSequence([]);
                    } else {
                        setKonamiSequence(newSequence);
                    }
                };
                
                document.addEventListener('keydown', handleKeyPress);
                return () => document.removeEventListener('keydown', handleKeyPress);
            }, [konamiSequence]);
            
            useEffect(() => {
                document.body.className = `theme-${theme}`;
                document.body.style.background = theme === 'matrix' ? '#000' : '#0a0a0a';
                document.body.style.color = theme === 'matrix' ? '#00ff41' : '#00ffff';
            }, [theme]);
            
            return (
                <div style={{ maxWidth: '800px', margin: '0 auto' }}>
                    <div className="terminal-card">
                        <h1 style={{ margin: '0 0 16px 0', fontSize: '2rem' }}>
                            Terminal UI Demo
                        </h1>
                        <p style={{ margin: '0 0 16px 0', opacity: 0.7 }}>
                            Current theme: {theme.toUpperCase()}
                        </p>
                        <p style={{ margin: '0 0 24px 0', opacity: 0.5, fontSize: '0.9rem' }}>
                            Try Konami code: ↑ ↑ ↓ ↓ ← → ← → B A
                        </p>
                        <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                            <button 
                                className="terminal-button"
                                onClick={() => setTheme(prev => prev === 'matrix' ? 'tron' : 'matrix')}
                            >
                                Toggle Theme
                            </button>
                            <button className="terminal-button">
                                Primary Button
                            </button>
                            <button 
                                className="terminal-button" 
                                style={{ opacity: 0.7, borderWidth: '1px' }}
                            >
                                Secondary
                            </button>
                        </div>
                    </div>
                    
                    <div className="terminal-card">
                        <h2 style={{ margin: '0 0 16px 0' }}>System Status</h2>
                        <div style={{ display: 'grid', gap: '8px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ opacity: 0.7 }}>Theme:</span>
                                <span>{theme.toUpperCase()}</span>
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ opacity: 0.7 }}>Konami Progress:</span>
                                <span>{Math.round((konamiSequence.length / KONAMI_CODE.length) * 100)}%</span>
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ opacity: 0.7 }}>Status:</span>
                                <span style={{ color: theme === 'matrix' ? '#00ff41' : '#00ffff' }}>
                                    ONLINE
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="terminal-card">
                        <h2 style={{ margin: '0 0 16px 0' }}>Package Info</h2>
                        <p style={{ margin: '0 0 8px 0', opacity: 0.7 }}>
                            @jonmatum/terminal-ui v1.0.0
                        </p>
                        <p style={{ margin: '0', opacity: 0.5, fontSize: '0.9rem' }}>
                            Terminal-style design system with Matrix/TRON themes
                        </p>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<Demo />, document.getElementById('root'));
    </script>
</body>
</html>
